databaseChangeLog:
  - changeSet:
      id: 004-update-cola-image
      author: aurora
      changes:
        # Le Cola için farklı bir görsele geçildi (photo id 29051732).
        # NOT: Pexels URL'i /photos/{id}/pexels-photo-{id}.jpeg biçimindedir —
        # yoldaki ve dosya adındaki id AYNI olmak zorunda, aksi halde 404 döner.
        - sql:
            sql: |
              UPDATE product.products
              SET image_url = 'https://images.pexels.com/photos/29051732/pexels-photo-29051732.jpeg?auto=compress&cs=tinysrgb&w=800'
              WHERE name = 'Le Cola';
      rollback:
        - sql:
            sql: |
              UPDATE product.products
              SET image_url = 'https://images.pexels.com/photos/4397824/pexels-photo-4397824.jpeg?auto=compress&cs=tinysrgb&w=800'
              WHERE name = 'Le Cola';
