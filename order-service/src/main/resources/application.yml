server:
  port: ${PORT:8085}

spring:
  datasource:
    # Ortam değişkeni gelirse (Docker) onu kullan, gelmezse (IDE) localhost:5455 kullan
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5455/aurora}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:dev}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Broker'a ulaşılamıyorsa en fazla 3sn bekle, checkout'u askıda bırakma.
        # §10.1 kuralı: Kafka kapalıyken checkout yine de başarılı olmalı.
        max.block.ms: 3000
  cloud:
    openfeign:
      client:
        config:
          # product-service cevap vermiyorsa 60 saniye bekleme; hızlı pes et ki
          # circuit breaker hatayı sayıp şarteli indirebilsin.
          default:
            connectTimeout: 3000
            readTimeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: orders
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: orders
    liquibase-schema: orders


jwt:
  secret: aurora-super-secret-key-must-be-32-bytes-long!

# Ürün servisine ve gizli kapısına ulaşmak için adres ve şifre
product-service:
  url: ${PRODUCT_SERVICE_URL:http://localhost:8082}
  internal-token: ${INTERNAL_TOKEN:local-internal-token}

# AI Support Agent (§10.4) — opsiyonel modül, anahtar yoksa /support 502 döner
google:
  api-key: ${GOOGLE_API_KEY:}
  model: ${GOOGLE_MODEL:gemini-flash-latest}

resilience4j:
  circuitbreaker:
    instances:
      productService:
        # Son 10 çağrıyı analiz et
        slidingWindowSize: 10
        # Sağlıklı karar için en az 5 çağrı görülsün
        minimumNumberOfCalls: 5
        # Bu çağrıların %50'si hata verirse devreyi AÇ (şarteli indir)
        failureRateThreshold: 50
        # Devre AÇIK (Open) konumda 15 saniye beklesin; bu sırada gelen tüm istekler anında reddedilir.
        waitDurationInOpenState: 15s
        # 15 sn sonra devreyi YARI-AÇIK (Half-Open) yapıp deneme amaçlı 3 isteğe izin ver.
        permittedNumberOfCallsInHalfOpenState: 3
        # Şarteli SADECE altyapı hatası indirir. Stok yetersizliği (OutOfStockException)
        # bir iş kuralıdır, listede olmadığı için hata olarak SAYILMAZ.
        recordExceptions:
          - com.aurora.order.exception.DownstreamUnavailableException
kafka:
  topics:
    order-created: order.created

# §10.5: yapılandırılmış (ECS) console log çıktısı — MDC'deki traceId otomatik dahil olur
logging:
  structured:
    format:
      console: ecs